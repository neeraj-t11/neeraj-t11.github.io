<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Slides</title>

    <!-- Reveal.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/theme/black.css">

    <style>
        body {
            margin: 0;
        }

        img {
            width: 100%;
            height: auto;
        }

        .top-bar {
            position: fixed;
            top: 10px;
            right: 20px;
            z-index: 999;
        }

        .top-bar a {
            background: #4CAF50;
            color: white;
            padding: 8px 12px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<!-- Paper Button -->
<div class="top-bar">
    <a href="paper.pdf" target="_blank">View Paper</a>
</div>

<div class="reveal">
    <div class="slides">

        <!-- Slide 1 -->
        <section>
            <img src="slides/slide1.png">
        </section>

        <!-- Slide 2 -->
        <section>
            <img src="slides/slide2.png">
        </section>

        <!-- Slide 3 -->
        <section>
            <img src="slides/slide3.png">
        </section>

        <!-- Add more slides as needed -->

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.js"></script>

<script>
    Reveal.initialize({
        controls: true,
        progress: true,
        slideNumber: true,
        hash: true,
        touch: true,
        transition: "slide"
    });
</script>

</body>
</html>
